name: bingo_mobile
description: "BinGo mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  go_router: ^16.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  image_picker: ^1.2.0
